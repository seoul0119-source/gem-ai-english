<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>GEM AI Learning Mission</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family:
        Arial,
        "Noto Sans KR",
        sans-serif;
      background: #f4f7fb;
      color: #111827;
    }

    .container {
      width: 100%;
      max-width: 560px;
      padding: 42px 38px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow:
        0 10px 35px rgba(0, 0, 0, 0.13);
    }

    h1 {
      margin: 0 0 18px;
      text-align: center;
      font-size: 34px;
      line-height: 1.25;
    }

    h2 {
      margin: 0 0 30px;
      text-align: center;
      font-size: 25px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 56px;
      padding: 14px 16px;
      border: 1px solid #9ca3af;
      border-radius: 8px;
      background: #ffffff;
      font-size: 18px;
    }

    input:focus,
    select:focus {
      outline: 3px solid rgba(47, 128, 237, 0.2);
      border-color: #2f80ed;
    }

    button {
      display: block;
      width: 190px;
      min-height: 62px;
      margin: 28px auto 0;
      border: 0;
      border-radius: 10px;
      background: #2f80ed;
      color: #ffffff;
      font-size: 24px;
      cursor: pointer;
    }

    button:hover {
      background: #1769d2;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    #statusMessage {
      min-height: 24px;
      margin-top: 20px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
    }

    .status-processing {
      color: #1d4ed8;
    }

    .status-success {
      color: #15803d;
    }

    .status-error {
      color: #b91c1c;
    }

    .privacy-note {
      margin-top: 24px;
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.5;
    }

    #saveFrame {
      display: none;
      width: 0;
      height: 0;
      border: 0;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
        align-items: flex-start;
      }

      .container {
        margin-top: 20px;
        padding: 30px 22px;
      }

      h1 {
        font-size: 28px;
      }

      h2 {
        font-size: 22px;
      }

      input,
      select {
        font-size: 16px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>GEM AI Learning Mission</h1>
    <h2>학생 정보</h2>

    <form
      id="studentForm"
      method="POST"
      target="saveFrame"
    >
      <div class="field">
        <label for="studentName">
          이름
        </label>

        <input
          id="studentName"
          name="name"
          type="text"
          placeholder="학생 이름"
          maxlength="30"
          autocomplete="name"
          required
        >
      </div>

      <div class="field">
        <label for="studentGrade">
          학년
        </label>

        <select
          id="studentGrade"
          name="grade"
          required
        >
          <option value="">
            학년을 선택하세요
          </option>

          <option value="2학년">2학년</option>
          <option value="3학년">3학년</option>
          <option value="4학년">4학년</option>
          <option value="5학년">5학년</option>
          <option value="6학년">6학년</option>
          <option value="7학년">7학년</option>
          <option value="8학년">8학년</option>
          <option value="9학년">9학년</option>
        </select>
      </div>

      <div class="field">
        <label for="registrationType">
          등록 유형
        </label>

        <select
          id="registrationType"
          name="registrationType"
          required
        >
          <option value="체험">
            체험
          </option>

          <option value="1개월 무료">
            1개월 무료
          </option>

          <option value="정규 등록">
            정규 등록
          </option>
        </select>
      </div>

      <button
        id="startButton"
        type="submit"
      >
        START
      </button>
    </form>

    <div
      id="statusMessage"
      role="status"
      aria-live="polite"
    ></div>

    <p class="privacy-note">
      입력한 정보는 GEM 학생 등록 및
      학습 관리 목적으로만 사용됩니다.
    </p>

    <iframe
      id="saveFrame"
      name="saveFrame"
      title="학생 정보 저장"
    ></iframe>
  </main>

  <script>
    /*
     * Apps Script의 /exec 웹앱 URL을
     * 아래 따옴표 안에 붙여 넣으세요.
     */
    const WEB_APP_URL =
  "https://script.google.com/macros/s/AKfycbyWYSrtfORZHG-DnpFHVP18OCQVKqon-yJxDpDNDr_tL0VgSmx1M_mvv5h7Icw1ho1dDA/exec";

    const EMMA_PAGE =
      "emma-test.html";

    const form =
      document.getElementById("studentForm");

    const iframe =
      document.getElementById("saveFrame");

    const startButton =
      document.getElementById("startButton");

    const statusMessage =
      document.getElementById("statusMessage");

    let registrationInProgress = false;
    let timeoutId = null;

    form.action = WEB_APP_URL;
    
    form.addEventListener("submit", function () {
      if (registrationInProgress) {
        return false;
      }

      if (
        !WEB_APP_URL.startsWith(
          "https://script.google.com/macros/s/"
        ) ||
        !WEB_APP_URL.endsWith("/exec")
      ) {
        showError(
          "Apps Script 웹앱 주소가 설정되지 않았습니다."
        );

        return false;
      }

      registrationInProgress = true;

      startButton.disabled = true;
      startButton.textContent = "등록 중...";

      statusMessage.className =
        "status-processing";

      statusMessage.textContent =
        "학생 정보를 안전하게 저장하고 있습니다.";

      timeoutId = window.setTimeout(
        function () {
          registrationInProgress = false;

          startButton.disabled = false;
          startButton.textContent = "다시 시도";

          showError(
            "저장 응답이 늦어지고 있습니다. 잠시 후 다시 시도해 주세요."
          );
        },
        20000
      );

      return true;
    });

    window.addEventListener(
  "message",
  function (event) {
    console.log(
      "Apps Script 메시지 수신:",
      event.origin,
      event.data
    );

    const result = event.data;

    if (
      !result ||
      typeof result !== "object" ||
      typeof result.success !== "boolean"
    ) {
      return;
    }

    window.clearTimeout(timeoutId);

    if (!result.success) {
      registrationInProgress = false;

      startButton.disabled = false;
      startButton.textContent = "다시 시도";

      showError(
        result.message ||
        "학생 정보를 저장하지 못했습니다."
      );

      return;
    }

    statusMessage.className =
      "status-success";

    statusMessage.textContent =
      `등록 완료! 학생 ID: ${result.studentId}`;

    localStorage.setItem(
      "gemStudentId",
      result.studentId
    );

    localStorage.setItem(
      "gemStudentName",
      result.name
    );

    localStorage.setItem(
      "gemRegistrationType",
      result.registrationType
    );

    const nextUrl =
      new URL(
        EMMA_PAGE,
        window.location.href
      );

    nextUrl.searchParams.set(
      "studentId",
      result.studentId
    );

    nextUrl.searchParams.set(
      "name",
      result.name
    );

    window.setTimeout(
      function () {
        window.location.href =
          nextUrl.toString();
      },
      1200
    );
  }
);

    function showError(message) {
      statusMessage.className =
        "status-error";

      statusMessage.textContent = message;
    }
  </script>
</body>
</html>
