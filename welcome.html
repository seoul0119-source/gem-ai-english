<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>GEM AI Learning Mission</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f7fb;
    text-align:center;
    padding:50px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

input,select{
    width:90%;
    padding:12px;
    margin:10px;
    font-size:18px;
}

button{
    margin-top:20px;
    padding:15px 40px;
    font-size:22px;
    background:#2f80ed;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#1366d6;
}
</style>

</head>

<body>

<div class="container">

<h1>GEM AI Learning Mission</h1>

<h2>학생 정보</h2>

<form
  id="studentForm"
  action="https://script.google.com/macros/s/AKfycbWYSrtf0RZHG-DnpFHVP18OCQVKqon-yJxDpDNDr_tL0VgSmx1M_mvv5h7Icw1ho1dDA/exec"
  method="POST"
  target="saveFrame"
  onsubmit="return startMission();"
>
  <input
    id="studentName"
    name="name"
    type="text"
    placeholder="이름"
    required
  >

  <input
    id="studentGrade"
    name="grade"
    type="text"
    placeholder="학년"
    required
  >

  <select name="registrationType" required>
    <option value="체험">체험</option>
    <option value="1개월 무료">1개월 무료</option>
    <option value="정규 등록">정규 등록</option>
  </select>

  <br>

  <button id="startButton" type="submit">
    START
  </button>
</form>

<iframe
  name="saveFrame"
  style="display:none;"
></iframe>

<script>
function startMission() {
  const button = document.getElementById("startButton");

  button.disabled = true;
  button.textContent = "등록 중...";

  setTimeout(function () {
    window.location.href = "emma-test.html";
  }, 2000);

  return true;
}
</script>

</div>

</body>
</html>
