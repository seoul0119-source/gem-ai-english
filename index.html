<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>GEM AI English</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f8ff;
      text-align: center;
      color: #111827;
    }

    header {
      background: #2f7df4;
      color: white;
      padding: 28px 15px;
    }

    header h1 {
      margin: 0 0 12px;
      font-size: 34px;
    }

    header p {
      margin: 0;
      font-size: 18px;
    }

    main {
      display: flex;
      justify-content: center;
      padding: 45px 20px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      padding: 30px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 26px;
      font-size: 28px;
    }

    .menu-button,
    .level-button {
      display: block;
      width: 100%;
      margin: 14px 0;
      padding: 17px 15px;
      border: none;
      border-radius: 12px;
      background: #2f7df4;
      color: white;
      font-size: 20px;
      text-decoration: none;
      cursor: pointer;
    }

    .menu-button:hover,
    .level-button:hover {
      background: #1768dc;
    }

    #wordMenu {
      display: none;
      margin-top: 25px;
      padding-top: 22px;
      border-top: 1px solid #d8dee9;
    }

    #wordMenu h3 {
      font-size: 23px;
      margin: 0 0 18px;
    }

    .coming-soon {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .notice {
      margin-top: 22px;
      color: #475569;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 28px;
      }

      .card {
        padding: 24px 18px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>GEM AI English</h1>
    <p>Welcome to AI English Teacher</p>
  </header>

  <main>
    <section class="card">

      <h2>👩‍🏫 GEM AI Teacher Team</h2>

      <button
        class="menu-button"
        type="button"
        onclick="showWordMenu()"
      >
        🍎 Words
      </button>

      <button
        class="menu-button coming-soon"
        type="button"
        disabled
      >
        📚 Story Reading — Coming Soon
      </button>

      <button
        class="menu-button coming-soon"
        type="button"
        disabled
      >
        🎤 Speaking — Coming Soon
      </button>

      <div id="wordMenu">

        <h3>🍎 Word Class</h3>

        <button
          class="level-button coming-soon"
          type="button"
          disabled
        >
          Word Lv.1 — Coming Soon
        </button>

        <button
          class="level-button coming-soon"
          type="button"
          disabled
        >
          Word Lv.2 — Coming Soon
        </button>

        <button
          class="level-button coming-soon"
          type="button"
          disabled
        >
          Word Lv.3 — Coming Soon
        </button>

        <a
          class="level-button"
          href="https://chatgpt.com/g/g-6a45f9336ad48191bbe4524a1796ed7b-word-teacher-gpt-lv4"
          target="_blank"
          rel="noopener noreferrer"
        >
          🍎 Word Lv.4 수업 시작
        </a>

        <button
          class="level-button coming-soon"
          type="button"
          disabled
        >
          Word Lv.5 — Coming Soon
        </button>

        <p class="notice">
          ChatGPT에 로그인한 상태에서<br>
          Word Lv.4 수업 시작 버튼을 눌러주세요.
        </p>

      </div>

    </section>
  </main>

  <script>
    function showWordMenu() {
      const wordMenu = document.getElementById("wordMenu");

      if (wordMenu.style.display === "block") {
        wordMenu.style.display = "none";
      } else {
        wordMenu.style.display = "block";
        wordMenu.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      }
    }
  </script>

</body>
</html>
